<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TON FOURNISSEUR EN CHINE 🇨🇳</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --red-primary: #FF0000;
            --red-dark: #CC0000;
            --red-glow: rgba(255, 0, 0, 0.3);
            --black: #0A0A0A;
            --black-soft: #151515;
            --white: #FFFFFF;
            --gray-light: #E0E0E0;
            --gray-mid: #808080;
            --gold: #FFD700;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--black);
            color: var(--white);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* SPLASH SCREEN - Dark Mode */
        .splash-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--black);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            animation: fadeOutSplash 0.6s ease 2.2s forwards;
        }

        @keyframes fadeOutSplash {
            to {
                opacity: 0;
                visibility: hidden;
            }
        }

        .splash-brand {
            text-align: center;
            animation: glitchIn 1s ease-out;
        }

        @keyframes glitchIn {
            0%, 100% { opacity: 1; transform: translateY(0); }
            20% { opacity: 0.8; transform: translateY(-5px) translateX(-2px); }
            40% { opacity: 1; transform: translateY(0) translateX(2px); }
            60% { opacity: 0.9; transform: translateY(3px); }
        }

        .splash-logo {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 2px;
            margin-bottom: 12px;
            text-transform: uppercase;
            background: linear-gradient(135deg, var(--red-primary) 0%, #FF4444 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .splash-flag {
            font-size: 48px;
            margin-bottom: 20px;
            animation: wave 1.5s ease-in-out infinite;
        }

        @keyframes wave {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(-10deg); }
            75% { transform: rotate(10deg); }
        }

        .splash-tagline {
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--gray-mid);
            font-weight: 700;
        }

        /* APP CONTAINER */
        .app-container {
            opacity: 0;
            animation: fadeInApp 0.6s ease 2.5s forwards;
        }

        @keyframes fadeInApp {
            to { opacity: 1; }
        }

        /* HEADER - Streetwear Style */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 10, 10, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 0, 0, 0.15);
            padding: 16px 20px;
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .brand-logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand-flag {
            font-size: 24px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .brand-name {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            background: var(--black-soft);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 18px;
        }

        .icon-btn:active {
            transform: scale(0.92);
            border-color: var(--red-primary);
        }

        .search-wrapper {
            position: relative;
        }

        .search-box {
            width: 100%;
            padding: 14px 20px 14px 46px;
            background: var(--black-soft);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: var(--white);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 500;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-box::placeholder {
            color: var(--gray-mid);
        }

        .search-box:focus {
            border-color: var(--red-primary);
            box-shadow: 0 0 0 3px var(--red-glow);
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gray-mid);
            font-size: 16px;
        }

        /* PRODUCTS - Grid Dark */
        .products-container {
            padding: 20px;
            padding-bottom: 140px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .product-card {
            background: var(--black-soft);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
            position: relative;
        }

        .product-card:active {
            transform: scale(0.98);
        }

        .product-card.out-of-stock {
            opacity: 0.4;
        }

        .product-card.out-of-stock::after {
            content: 'SOLD OUT';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-15deg);
            background: var(--red-primary);
            color: var(--white);
            padding: 8px 20px;
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700;
            font-size: 14px;
            letter-spacing: 2px;
            z-index: 20;
            box-shadow: 0 4px 20px var(--red-glow);
        }

        .product-image-wrap {
            position: relative;
            width: 100%;
            padding-bottom: 100%;
            background: var(--black);
            overflow: hidden;
        }

        .product-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s ease;
        }

        .product-card:active .product-image {
            transform: scale(1.05);
        }

        .badges-row {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .badge {
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            backdrop-filter: blur(12px);
        }

        .badge-moq {
            background: rgba(255, 255, 255, 0.95);
            color: var(--black);
        }

        .badge-grade {
            background: linear-gradient(135deg, var(--gold) 0%, #DAA520 100%);
            color: var(--black);
            box-shadow: 0 2px 10px rgba(255, 215, 0, 0.4);
        }

        .product-details {
            padding: 14px;
        }

        .product-name {
            font-size: 13px;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 10px;
            height: 36px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            color: var(--white);
        }

        .product-price {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 20px;
            font-weight: 700;
            color: var(--red-primary);
            margin-bottom: 12px;
            letter-spacing: -0.5px;
        }

        .add-btn {
            width: 100%;
            padding: 12px;
            background: var(--red-primary);
            border: none;
            border-radius: 8px;
            color: var(--white);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 16px var(--red-glow);
        }

        .add-btn:active {
            transform: scale(0.95);
            background: var(--red-dark);
        }

        .product-card.out-of-stock .add-btn {
            background: var(--gray-mid);
            box-shadow: none;
            pointer-events: none;
        }

        /* BOTTOM BAR - Streetwear */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10, 10, 10, 0.98);
            backdrop-filter: blur(25px);
            border-top: 1px solid rgba(255, 0, 0, 0.2);
            padding: 20px;
            z-index: 90;
            box-shadow: 0 -10px 40px rgba(255, 0, 0, 0.15);
        }

        .cart-summary {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }

        .total-label {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--gray-mid);
        }

        .total-value {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 28px;
            font-weight: 700;
            color: var(--red-primary);
            letter-spacing: -1px;
        }

        .checkout-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--red-primary) 0%, var(--red-dark) 100%);
            border: none;
            border-radius: 10px;
            color: var(--white);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 30px var(--red-glow);
            position: relative;
            overflow: hidden;
        }

        .checkout-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s ease, height 0.6s ease;
        }

        .checkout-btn:active::before {
            width: 300px;
            height: 300px;
        }

        .checkout-btn:active {
            transform: scale(0.97);
        }

        .checkout-btn:disabled {
            background: var(--gray-mid);
            box-shadow: none;
            opacity: 0.5;
        }

        /* MODALS - Dark Theme */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            animation: fadeInModal 0.3s ease;
        }

        .modal-overlay.active {
            display: flex;
        }

        @keyframes fadeInModal {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal {
            background: var(--black-soft);
            border: 1px solid rgba(255, 0, 0, 0.3);
            border-radius: 16px;
            width: 90%;
            max-width: 400px;
            max-height: 80vh;
            overflow-y: auto;
            animation: slideUpModal 0.4s ease;
            box-shadow: 0 20px 60px rgba(255, 0, 0, 0.3);
        }

        @keyframes slideUpModal {
            from {
                opacity: 0;
                transform: translateY(50px) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .modal-header {
            padding: 24px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .modal-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }

        .modal-subtitle {
            font-size: 13px;
            color: var(--gray-mid);
        }

        .modal-body {
            padding: 24px;
        }

        .modal-footer {
            padding: 16px 24px 24px;
            display: flex;
            gap: 12px;
        }

        /* PASSWORD INPUT */
        .password-field {
            width: 100%;
            padding: 16px;
            background: var(--black);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: var(--white);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 18px;
            font-weight: 600;
            text-align: center;
            letter-spacing: 4px;
            outline: none;
            transition: all 0.3s ease;
        }

        .password-field:focus {
            border-color: var(--red-primary);
            box-shadow: 0 0 0 3px var(--red-glow);
        }

        .password-error {
            color: var(--red-primary);
            font-size: 12px;
            font-weight: 700;
            text-align: center;
            margin-top: 10px;
            display: none;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .password-error.show {
            display: block;
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* ADMIN PANEL */
        .admin-panel {
            display: none;
            padding: 20px;
            padding-bottom: 100px;
        }

        .admin-panel.active {
            display: block;
        }

        .admin-hero {
            background: linear-gradient(135deg, var(--red-primary) 0%, var(--red-dark) 100%);
            padding: 28px;
            border-radius: 14px;
            margin-bottom: 24px;
            position: relative;
            overflow: hidden;
        }

        .admin-hero::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: rotate 10s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .admin-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 8px;
            position: relative;
        }

        .admin-subtitle {
            font-size: 13px;
            opacity: 0.9;
            position: relative;
        }

        .admin-block {
            background: var(--black-soft);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            padding: 24px;
            margin-bottom: 20px;
        }

        .block-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 20px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-field {
            margin-bottom: 16px;
        }

        .field-label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--gray-mid);
            margin-bottom: 8px;
        }

        .field-input, .field-select {
            width: 100%;
            padding: 14px 16px;
            background: var(--black);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: var(--white);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 500;
            outline: none;
            transition: all 0.3s ease;
        }

        .field-input:focus, .field-select:focus {
            border-color: var(--red-primary);
            box-shadow: 0 0 0 3px var(--red-glow);
        }

        .btn-main {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--red-primary) 0%, var(--red-dark) 100%);
            border: none;
            border-radius: 10px;
            color: var(--white);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px var(--red-glow);
        }

        .btn-main:active {
            transform: scale(0.97);
        }

        .btn-cancel {
            flex: 1;
            padding: 14px;
            background: var(--black);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            color: var(--white);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-cancel:active {
            background: var(--black-soft);
        }

        /* INVENTORY */
        .inventory-row {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px;
            background: var(--black);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 10px;
            margin-bottom: 12px;
        }

        .inventory-thumb {
            width: 80px;
            height: 80px;
            border-radius: 8px;
            object-fit: cover;
            background: var(--black-soft);
        }

        .inventory-data {
            flex: 1;
        }

        .inventory-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .inventory-meta {
            font-size: 16px;
            font-weight: 700;
            color: var(--red-primary);
        }

        .inventory-controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .stock-toggle-wrap {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stock-status {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--gray-mid);
        }

        .toggle {
            width: 48px;
            height: 26px;
            background: #34C759;
            border-radius: 13px;
            cursor: pointer;
            position: relative;
            transition: all 0.3s ease;
        }

        .toggle.off {
            background: var(--gray-mid);
        }

        .toggle::after {
            content: '';
            position: absolute;
            top: 3px;
            left: 3px;
            width: 20px;
            height: 20px;
            background: var(--white);
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        .toggle.off::after {
            left: 25px;
        }

        .btn-mini {
            width: 38px;
            height: 38px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .btn-edit {
            background: #007AFF;
        }

        .btn-delete {
            background: var(--red-primary);
        }

        .btn-mini:active {
            transform: scale(0.88);
        }

        .logout-fab {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 60px;
            height: 60px;
            background: var(--red-primary);
            border: none;
            border-radius: 50%;
            color: var(--white);
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 6px 30px var(--red-glow);
            transition: all 0.3s ease;
            z-index: 80;
        }

        .logout-fab:active {
            transform: scale(0.88) rotate(90deg);
        }

        /* SCROLLBAR */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--black);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--red-primary);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <!-- SPLASH -->
    <div class="splash-screen">
        <div class="splash-brand">
            <div class="splash-flag">🇨🇳</div>
            <div class="splash-logo">TON FOURNISSEUR</div>
            <div class="splash-tagline">Sourcing Premium</div>
        </div>
    </div>

    <!-- CLIENT VIEW -->
    <div class="app-container" id="clientView">
        <div class="header">
            <div class="header-top">
                <div class="brand-logo">
                    <span class="brand-flag">🇨🇳</span>
                    <span class="brand-name">TON FOURNISSEUR</span>
                </div>
                <div class="header-actions">
                    <button class="icon-btn" id="adminBtn">⚙️</button>
                </div>
            </div>
            <div class="search-wrapper">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-box" placeholder="Rechercher..." id="searchInput">
            </div>
        </div>

        <div class="products-container">
            <div class="products-grid" id="productsGrid"></div>
        </div>

        <div class="bottom-bar">
            <div class="cart-summary">
                <span class="total-label">Total Estimé</span>
                <span class="total-value" id="totalValue">0.00 €</span>
            </div>
            <button class="checkout-btn" id="checkoutBtn" disabled>📨 Envoyer sur Telegram</button>
        </div>
    </div>

    <!-- ADMIN PANEL -->
    <div class="admin-panel" id="adminPanel">
        <div class="admin-hero">
            <div class="admin-title">⚡ ADMIN PANEL</div>
            <div class="admin-subtitle">Gestion Catalogue & Inventaire</div>
        </div>

        <div class="admin-block">
            <div class="block-title">➕ Ajouter Produit</div>
            <form id="addForm">
                <div class="form-field">
                    <label class="field-label">Nom Produit</label>
                    <input type="text" class="field-input" id="pName" required>
                </div>
                <div class="form-field">
                    <label class="field-label">Prix (€)</label>
                    <input type="number" step="0.01" class="field-input" id="pPrice" required>
                </div>
                <div class="form-field">
                    <label class="field-label">MOQ</label>
                    <input type="number" class="field-input" id="pMoq" required>
                </div>
                <div class="form-field">
                    <label class="field-label">Catégorie</label>
                    <select class="field-select" id="pCategory" required>
                        <option value="vetements">Vêtements</option>
                        <option value="tech">High-Tech</option>
                        <option value="bagagerie">Bagagerie</option>
                        <option value="accessoires">Accessoires</option>
                        <option value="maison">Maison</option>
                    </select>
                </div>
                <div class="form-field">
                    <label class="field-label">URL Image</label>
                    <input type="url" class="field-input" id="pImage" required>
                </div>
                <button type="submit" class="btn-main">✨ Ajouter</button>
            </form>
        </div>

        <div class="admin-block">
            <div class="block-title">📦 Inventaire</div>
            <div id="inventoryList"></div>
        </div>

        <button class="logout-fab" id="logoutBtn">🚪</button>
    </div>

    <!-- PASSWORD MODAL -->
    <div class="modal-overlay" id="passModal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title">🔐 ACCÈS ADMIN</div>
                <div class="modal-subtitle">Mot de passe requis</div>
            </div>
            <div class="modal-body">
                <input type="password" class="password-field" id="passInput" placeholder="••••••••" maxlength="20">
                <div class="password-error" id="passError">❌ Incorrect</div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" id="passCancel">Annuler</button>
                <button class="btn-main" id="passSubmit">Valider</button>
            </div>
        </div>
    </div>

    <!-- EDIT MODAL -->
    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <div class="modal-header">
                <div class="modal-title">✏️ MODIFIER</div>
            </div>
            <div class="modal-body">
                <div class="form-field">
                    <label class="field-label">Prix (€)</label>
                    <input type="number" step="0.01" class="field-input" id="editPrice">
                </div>
                <div class="form-field">
                    <label class="field-label">URL Image</label>
                    <input type="url" class="field-input" id="editImage">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" id="editCancel">Annuler</button>
                <button class="btn-main" id="editSave">💾 Sauvegarder</button>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        let products = [
            {
                id: 1,
                name: 'Veste Technique Premium',
                price: 28.50,
                category: 'vetements',
                moq: 50,
                image: 'https://via.placeholder.com/400x400/151515/FF0000?text=VESTE',
                inStock: true
            },
            {
                id: 2,
                name: 'Écouteurs TWS Pro',
                price: 9.90,
                category: 'tech',
                moq: 100,
                image: 'https://via.placeholder.com/400x400/151515/FF0000?text=TWS',
                inStock: true
            },
            {
                id: 3,
                name: 'Sac Business Premium',
                price: 22.00,
                category: 'bagagerie',
                moq: 30,
                image: 'https://via.placeholder.com/400x400/151515/FF0000?text=SAC',
                inStock: true
            },
            {
                id: 4,
                name: 'Montre Connectée Sport',
                price: 35.00,
                category: 'accessoires',
                moq: 20,
                image: 'https://via.placeholder.com/400x400/151515/FF0000?text=WATCH',
                inStock: true
            }
        ];

        let cart = [];
        let isAdmin = false;
        let editId = null;

        function renderProducts() {
            const grid = document.getElementById('productsGrid');
            const search = document.getElementById('searchInput').value.toLowerCase();
            const filtered = products.filter(p => p.name.toLowerCase().includes(search));
            
            grid.innerHTML = filtered.map(p => `
                <div class="product-card ${!p.inStock ? 'out-of-stock' : ''}" data-id="${p.id}">
                    <div class="product-image-wrap">
                        <img src="${p.image}" alt="${p.name}" class="product-image">
                        <div class="badges-row">
                            <div class="badge badge-moq">MOQ ${p.moq}</div>
                            <div class="badge badge-grade">⭐ A</div>
                        </div>
                    </div>
                    <div class="product-details">
                        <div class="product-name">${p.name}</div>
                        <div class="product-price">${p.price.toFixed(2)} €</div>
                        <button class="add-btn" data-id="${p.id}" ${!p.inStock ? 'disabled' : ''}>
                            ${p.inStock ? '+ Ajouter' : 'Sold Out'}
                        </button>
                    </div>
                </div>
            `).join('');

            document.querySelectorAll('.add-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    if (!this.disabled) addToCart(parseInt(this.dataset.id));
                });
            });
        }

        function addToCart(id) {
            const p = products.find(pr => pr.id === id);
            if (!p || !p.inStock) return;

            const ex = cart.find(item => item.id === id);
            if (ex) {
                ex.quantity += p.moq;
            } else {
                cart.push({ ...p, quantity: p.moq });
            }

            tg.HapticFeedback.impactOccurred('medium');
            updateTotal();
        }

        function updateTotal() {
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            document.getElementById('totalValue').textContent = total.toFixed(2) + ' €';
            document.getElementById('checkoutBtn').disabled = cart.length === 0;
        }

        function renderInventory() {
            const list = document.getElementById('inventoryList');
            if (products.length === 0) {
                list.innerHTML = '<p style="text-align:center;color:#808080;padding:20px;">Aucun produit</p>';
                return;
            }

            list.innerHTML = products.map(p => `
                <div class="inventory-row">
                    <img src="${p.image}" class="inventory-thumb" alt="${p.name}">
                    <div class="inventory-data">
                        <div class="inventory-title">${p.name}</div>
                        <div class="inventory-meta">${p.price.toFixed(2)} € · MOQ ${p.moq}</div>
                    </div>
                    <div class="inventory-controls">
                        <div class="stock-toggle-wrap">
                            <div class="toggle ${p.inStock ? '' : 'off'}" data-id="${p.id}"></div>
                            <span class="stock-status">${p.inStock ? 'Dispo' : 'Rupture'}</span>
                        </div>
                        <div style="display:flex;gap:8px;">
                            <button class="btn-mini btn-edit" data-id="${p.id}">✏️</button>
                            <button class="btn-mini btn-delete" data-id="${p.id}">🗑️</button>
                        </div>
                    </div>
                </div>
            `).join('');

            document.querySelectorAll('.toggle').forEach(tog => {
                tog.addEventListener('click', function() {
                    const id = parseInt(this.dataset.id);
                    const p = products.find(pr => pr.id === id);
                    p.inStock = !p.inStock;
                    tg.HapticFeedback.impactOccurred('light');
                    renderInventory();
                    renderProducts();
                });
            });

            document.querySelectorAll('.btn-edit').forEach(btn => {
                btn.addEventListener('click', function() {
                    openEdit(parseInt(this.dataset.id));
                });
            });

            document.querySelectorAll('.btn-delete').forEach(btn => {
                btn.addEventListener('click', function() {
                    const id = parseInt(this.dataset.id);
                    if (confirm('Supprimer définitivement ?')) {
                        products = products.filter(p => p.id !== id);
                        tg.HapticFeedback.notificationOccurred('success');
                        renderInventory();
                        renderProducts();
                    }
                });
            });
        }

        function openEdit(id) {
            editId = id;
            const p = products.find(pr => pr.id === id);
            document.getElementById('editPrice').value = p.price;
            document.getElementById('editImage').value = p.image;
            document.getElementById('editModal').classList.add('active');
        }

        // EVENTS
        document.getElementById('searchInput').addEventListener('input', renderProducts);

        document.getElementById('checkoutBtn').addEventListener('click', function() {
            if (cart.length === 0) return;

            let msg = '🛒 *DEVIS - TON FOURNISSEUR EN CHINE* 🇨🇳\n\n';
            cart.forEach(item => {
                msg += `📦 *${item.name}*\n   • Qté: ${item.quantity} pcs\n   • Prix: ${item.price.toFixed(2)} €\n   • Sous-total: ${(item.price * item.quantity).toFixed(2)} €\n\n`;
            });
            
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            msg += `💰 *TOTAL: ${total.toFixed(2)} €*`;

            const enc = encodeURIComponent(msg);
            tg.openTelegramLink(`https://t.me/SourcingChinaBot?text=${enc}`);
        });

        document.getElementById('adminBtn').addEventListener('click', function() {
            document.getElementById('passModal').classList.add('active');
            document.getElementById('passInput').value = '';
            document.getElementById('passError').classList.remove('show');
        });

        document.getElementById('passSubmit').addEventListener('click', function() {
            const pass = document.getElementById('passInput').value;
            if (pass === 'admin888') {
                isAdmin = true;
                document.getElementById('passModal').classList.remove('active');
                document.getElementById('clientView').style.display = 'none';
                document.getElementById('adminPanel').classList.add('active');
                renderInventory();
                tg.HapticFeedback.notificationOccurred('success');
            } else {
                document.getElementById('passError').classList.add('show');
                tg.HapticFeedback.notificationOccurred('error');
            }
        });

        document.getElementById('passCancel').addEventListener('click', function() {
            document.getElementById('passModal').classList.remove('active');
        });

        document.getElementById('passInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') document.getElementById('passSubmit').click();
        });

        document.getElementById('logoutBtn').addEventListener('click', function() {
            isAdmin = false;
            document.getElementById('adminPanel').classList.remove('active');
            document.getElementById('clientView').style.display = 'block';
            tg.HapticFeedback.impactOccurred('medium');
        });

        document.getElementById('addForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const newP = {
                id: Date.now(),
                name: document.getElementById('pName').value,
                price: parseFloat(document.getElementById('pPrice').value),
                moq: parseInt(document.getElementById('pMoq').value),
                category: document.getElementById('pCategory').value,
                image: document.getElementById('pImage').value,
                inStock: true
            };
            products.push(newP);
            tg.HapticFeedback.notificationOccurred('success');
            this.reset();
            renderInventory();
            renderProducts();
        });

        document.getElementById('editSave').addEventListener('click', function() {
            const p = products.find(pr => pr.id === editId);
            p.price = parseFloat(document.getElementById('editPrice').value);
            p.image = document.getElementById('editImage').value;
            document.getElementById('editModal').classList.remove('active');
            tg.HapticFeedback.notificationOccurred('success');
            renderInventory();
            renderProducts();
        });

        document.getElementById('editCancel').addEventListener('click', function() {
            document.getElementById('editModal').classList.remove('active');
        });

        renderProducts();
    </script>
</body>
</html>
