<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sourcing Hub</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #F5F5F7;
            color: #1C1C1E;
            padding-bottom: 100px;
            -webkit-font-smoothing: antialiased;
        }

        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 20px 20px 16px;
        }

        .logo {
            font-size: 28px;
            font-weight: 900;
            text-align: center;
            letter-spacing: -0.5px;
            margin-bottom: 16px;
        }

        .search-container {
            position: relative;
            max-width: 600px;
            margin: 0 auto;
        }

        .search-input {
            width: 100%;
            padding: 12px 16px 12px 44px;
            border: none;
            border-radius: 12px;
            background: #F2F2F7;
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            font-weight: 400;
            color: #1C1C1E;
            outline: none;
            transition: all 0.2s ease;
        }

        .search-input:focus {
            background: #E8E8ED;
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            opacity: 0.5;
        }

        .categories {
            padding: 20px 0 20px 20px;
            overflow-x: auto;
            overflow-y: hidden;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
        }

        .categories::-webkit-scrollbar {
            display: none;
        }

        .category-item {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            margin-right: 16px;
            cursor: pointer;
        }

        .category-circle {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: #FFFFFF;
            border: 2px solid #E5E5EA;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-bottom: 8px;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .category-item.active .category-circle {
            border-color: #1C1C1E;
            border-width: 3px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }

        .category-name {
            font-size: 12px;
            font-weight: 600;
            color: #8E8E93;
        }

        .category-item.active .category-name {
            color: #1C1C1E;
        }

        .products-grid {
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }

        .product-card {
            background: #FFFFFF;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }

        .product-image-container {
            position: relative;
            width: 100%;
            padding-bottom: 100%;
            background: #F2F2F7;
        }

        .product-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .moq-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(10px);
            color: #FFFFFF;
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.3px;
        }

        .product-info {
            padding: 14px;
        }

        .product-title {
            font-size: 14px;
            font-weight: 600;
            line-height: 1.3;
            margin-bottom: 8px;
            height: 36px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .product-price {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: -0.3px;
        }

        .add-button {
            width: 100%;
            padding: 10px;
            background: #F2F2F7;
            border: none;
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
            color: #1C1C1E;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .add-button:active {
            background: #E5E5EA;
            transform: scale(0.98);
        }

        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 16px 20px;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }

        .total-section {
            flex: 1;
        }

        .total-label {
            font-size: 12px;
            font-weight: 600;
            color: #8E8E93;
            margin-bottom: 2px;
        }

        .total-amount {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: -0.5px;
        }

        .checkout-button {
            padding: 16px 32px;
            background: #1C1C1E;
            color: #FFFFFF;
            border: none;
            border-radius: 12px;
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .checkout-button:active {
            transform: scale(0.96);
        }

        .checkout-button:disabled {
            background: #E5E5EA;
            color: #8E8E93;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">SOURCING HUB</div>
        <div class="search-container">
            <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.35-4.35"></path>
            </svg>
            <input type="text" class="search-input" placeholder="Rechercher des produits..." id="searchInput">
        </div>
    </div>

    <div class="categories" id="categories"></div>

    <div class="products-grid" id="productsGrid"></div>

    <div class="bottom-bar">
        <div class="total-section">
            <div class="total-label">Total Estimé</div>
            <div class="total-amount" id="totalAmount">0.00 €</div>
        </div>
        <button class="checkout-button" id="checkoutBtn" disabled>Demander le Devis</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const categories = [
            { id: 'all', name: 'Tous', emoji: '🌐' },
            { id: 'vetements', name: 'Vêtements', emoji: '👕' },
            { id: 'tech', name: 'High-Tech', emoji: '📱' },
            { id: 'bagagerie', name: 'Bagagerie', emoji: '🎒' },
            { id: 'accessoires', name: 'Accessoires', emoji: '⌚' }
        ];

        const products = [
            {
                id: 1,
                name: 'Veste Technique Premium',
                price: 24.50,
                category: 'vetements',
                moq: 50,
                image: 'https://via.placeholder.com/400x400/1C1C1E/FFFFFF?text=Veste'
            },
            {
                id: 2,
                name: 'Écouteurs Bluetooth TWS',
                price: 8.90,
                category: 'tech',
                moq: 100,
                image: 'https://via.placeholder.com/400x400/1C1C1E/FFFFFF?text=Ecouteurs'
            },
            {
                id: 3,
                name: 'Sac à Dos Business',
                price: 18.00,
                category: 'bagagerie',
                moq: 30,
                image: 'https://via.placeholder.com/400x400/1C1C1E/FFFFFF?text=Sac'
            },
            {
                id: 4,
                name: 'Montre Connectée Sport',
                price: 32.00,
                category: 'accessoires',
                moq: 20,
                image: 'https://via.placeholder.com/400x400/1C1C1E/FFFFFF?text=Montre'
            },
            {
                id: 5,
                name: 'T-Shirt Col Rond Premium',
                price: 4.20,
                category: 'vetements',
                moq: 200,
                image: 'https://via.placeholder.com/400x400/1C1C1E/FFFFFF?text=T-Shirt'
            },
            {
                id: 6,
                name: 'Chargeur Sans Fil 15W',
                price: 6.50,
                category: 'tech',
                moq: 100,
                image: 'https://via.placeholder.com/400x400/1C1C1E/FFFFFF?text=Chargeur'
            }
        ];

        let cart = [];
        let currentFilter = 'all';

        function renderCategories() {
            const container = document.getElementById('categories');
            container.innerHTML = categories.map(cat => `
                <div class="category-item ${cat.id === 'all' ? 'active' : ''}" data-category="${cat.id}">
                    <div class="category-circle">${cat.emoji}</div>
                    <div class="category-name">${cat.name}</div>
                </div>
            `).join('');

            document.querySelectorAll('.category-item').forEach(item => {
                item.addEventListener('click', function() {
                    document.querySelectorAll('.category-item').forEach(i => i.classList.remove('active'));
                    this.classList.add('active');
                    currentFilter = this.dataset.category;
                    renderProducts();
                });
            });
        }

        function renderProducts() {
            const container = document.getElementById('productsGrid');
            const filtered = currentFilter === 'all' ? products : products.filter(p => p.category === currentFilter);
            
            container.innerHTML = filtered.map(product => `
                <div class="product-card">
                    <div class="product-image-container">
                        <img src="${product.image}" alt="${product.name}" class="product-image">
                        <div class="moq-badge">MOQ : ${product.moq} pcs</div>
                    </div>
                    <div class="product-info">
                        <div class="product-title">${product.name}</div>
                        <div class="product-price">${product.price.toFixed(2)} €</div>
                        <button class="add-button" data-id="${product.id}">Ajouter au Devis</button>
                    </div>
                </div>
            `).join('');

            document.querySelectorAll('.add-button').forEach(btn => {
                btn.addEventListener('click', function() {
                    const productId = parseInt(this.dataset.id);
                    addToCart(productId);
                });
            });
        }

        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            const existing = cart.find(item => item.id === productId);

            if (existing) {
                existing.quantity += product.moq;
            } else {
                cart.push({
                    ...product,
                    quantity: product.moq
                });
            }

            tg.HapticFeedback.impactOccurred('medium');
            updateTotal();
        }

        function updateTotal() {
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            document.getElementById('totalAmount').textContent = total.toFixed(2) + ' €';
            document.getElementById('checkoutBtn').disabled = cart.length === 0;
        }

        document.getElementById('checkoutBtn').addEventListener('click', function() {
            if (cart.length === 0) return;

            let message = '🛒 *DEMANDE DE DEVIS*\n\n';
            cart.forEach(item => {
                message += `• ${item.name}\n  Quantité: ${item.quantity} pcs\n  Prix unitaire: ${item.price.toFixed(2)} €\n  Sous-total: ${(item.price * item.quantity).toFixed(2)} €\n\n`;
            });
            
            const total = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            message += `*TOTAL ESTIMÉ: ${total.toFixed(2)} €*`;

            const encoded = encodeURIComponent(message);
            tg.openTelegramLink(`https://t.me/SourcingBot?text=${encoded}`);
        });

        document.getElementById('searchInput').addEventListener('input', function(e) {
            const search = e.target.value.toLowerCase();
            const filtered = products.filter(p => p.name.toLowerCase().includes(search));
            const container = document.getElementById('productsGrid');
            
            container.innerHTML = filtered.map(product => `
                <div class="product-card">
                    <div class="product-image-container">
                        <img src="${product.image}" alt="${product.name}" class="product-image">
                        <div class="moq-badge">MOQ : ${product.moq} pcs</div>
                    </div>
                    <div class="product-info">
                        <div class="product-title">${product.name}</div>
                        <div class="product-price">${product.price.toFixed(2)} €</div>
                        <button class="add-button" data-id="${product.id}">Ajouter au Devis</button>
                    </div>
                </div>
            `).join('');

            document.querySelectorAll('.add-button').forEach(btn => {
                btn.addEventListener('click', function() {
                    const productId = parseInt(this.dataset.id);
                    addToCart(productId);
                });
            });
        });

        renderCategories();
        renderProducts();
    </script>
</body>
</html>
